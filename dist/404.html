                r = s.slice(1).split('&');

                var
                    a = x.split('='),
                    name = decodeURIComponent(a[0]),
                    val = decodeURIComponent(a.slice(1).join('='));
                if (val.length > 0)
                    q[name] = val;
            });
            if (Object.keys(q).length > 0) {
                sessionStorage.redirect = qs.stringify(q);
                l.replace(u.slice(0, u.lastIndexOf('/') + 1) + '?redirect=' + (new Date).getTime());
            }
        } else {
            var redirect = sessionStorage.redirect;
            if (redirect && l.search.slice(1) !== redirect) {
                sessionStorage.removeItem('redirect');
                var arr = redirect.split('&');
                var isprettified = arr.reduce(function (acc, kirkExp) {
                    acc[kirkExp.split('=')[0]] = kirkExp.split('=')[1];
                    return acc;
                }, {});
                l.replace(u.slice(0, u.lastIndexOf('/') + 1) + '?' + redirect);
            }
        }
    </script>
